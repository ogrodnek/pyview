<div class="max-w-4xl mx-auto p-6">
  <div class="bg-white shadow-lg rounded-lg overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6">
      <h1 class="text-3xl font-bold mb-2">Streams Demo</h1>
      <p class="text-sm text-blue-200 mt-2">
        Total messages: <span class="font-semibold">{{ context.message_count }}</span>
      </p>
    </div>

    <!-- Action Buttons -->
    <div class="bg-gray-50 p-4 border-b border-gray-200">
      <div class="flex flex-wrap gap-2">
        <button
          phx-click="add_top"
          class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition"
        >
          Add to Top
        </button>
        <button
          phx-click="add_bottom"
          class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition"
        >
          Add to Bottom
        </button>
        <button
          phx-click="add_bulk"
          class="px-4 py-2 bg-purple-500 text-white rounded hover:bg-purple-600 transition"
        >
          Add 5 Messages
        </button>
        <button
          phx-click="reset"
          class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition"
        >
          Reset
        </button>
      </div>
    </div>

    <!-- Messages List (Stream Container) -->
    <div
      id="messages-stream"
      phx-update="stream"
      data-phx-stream="{{ context.messages.ref }}"
      class="divide-y divide-gray-200 max-h-96 overflow-y-auto"
    >
      {% for dom_id, msg in context.messages %}
      <div
        id="{{ dom_id }}"
        class="p-4 hover:bg-gray-50 transition-colors group"
      >
        <div class="flex items-start justify-between">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-semibold text-gray-900">{{ msg.user }}</span>
              <span class="text-xs text-gray-400">
                #{{ msg.id }}
              </span>
            </div>
            <p class="text-gray-700">{{ msg.text }}</p>
          </div>
          <button
            phx-click="delete"
            phx-value-id="{{ msg.id }}"
            class="opacity-0 group-hover:opacity-100 transition-opacity ml-4 text-red-500 hover:text-red-700"
            title="Delete message"
          >
            ✕
          </button>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
